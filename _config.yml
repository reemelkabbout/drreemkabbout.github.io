# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: ReemWrites
email:
description: >- # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
twitter_username: username
github_username: username
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  
# Site Author
author:
  name: "Dr. Reem EL Kabbout"
  bio: "Biomedical Scientist | Medical Writer | PhD in Biomedical & Clinical Sciences"
  avatar: "IMG_74k54.jpg"
  location: "Quebec, Canada"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:reemelkabbout@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "www.linkedin.com/in/reemkabbout"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/reemelkabbout"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0009-0003-8041-2522"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=mtKhc0IAAAAJ&hl=en"
      
author_sidebar_extra: |
  <div class="sidebar__module" style="margin-top:15px;">
    <ul style="list-style:none; padding-left:0; margin:0; line-height:1.8;">
      <li>• Translational Research & Epigenetics</li>
      <li>• Medical Writing & Scientific Communication</li>
      <li>• Clinical Research & Digital Health</li>
      <li>• Bioinformatics & Omics Integration</li>
      <li>• Cardiovascular & Pulmonary Disease</li>
    </ul>
  </div>

footer:
  links: []
  text: |
    **Core Expertise & Research Focus:**
    * Translational Research & Epigenetics
    * Medical Writing & Scientific Communication
    * Clinical Research & Digital Health Assets
    * Bioinformatics &  Omics Integration
    * Cardiovascular & Pulmonary disease
    <br>
    © 2026 Reem Kabbout. Powered by GitHub Pages & Jekyll.

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true


category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
